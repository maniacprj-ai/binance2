<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crypto Wallet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-primary: #0e0f14;
    --bg-secondary: #171a21;
    --bg-card: #1c1f2a;
    --bg-card2: #212535;
    --accent-gold: #f0b90b;
    --accent-gold-dim: #c9920a;
    --accent-green: #2ecc71;
    --accent-red: #e74c3c;
    --text-primary: #ffffff;
    --text-secondary: #8b8fa8;
    --text-muted: #555870;
    --border: #2a2d3e;
    --tab-active: #ffffff;
    --tab-inactive: #8b8fa8;
  }

  body {
    background: #1a1d24;
    font-family: 'Sora', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .phone-wrapper {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 22px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .battery-icon {
    background: var(--accent-gold);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'Sora', sans-serif;
  }

  .signal-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 13px;
  }

  .signal-bars span {
    width: 3px;
    background: var(--text-primary);
    border-radius: 1px;
  }

  .signal-bars span:nth-child(1) { height: 4px; opacity: 0.4; }
  .signal-bars span:nth-child(2) { height: 7px; opacity: 0.4; }
  .signal-bars span:nth-child(3) { height: 10px; }
  .signal-bars span:nth-child(4) { height: 13px; }

  .wifi-icon {
    font-size: 14px;
  }

  /* Top Tab Switch */
  .tab-switcher {
    display: flex;
    justify-content: center;
    padding: 8px 20px 14px;
  }

  .tab-switcher-inner {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 1px;
    display: flex;
    gap: 0px;
    width: 240px;
  }

  .tab-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 9px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tab-btn.active {
    background: #2b2f36;
    color: #ffffff;
    border-radius: 0px 8px 8px 0px;
  }

  .tab-btn.inactive {
    background: #1a1d24;
    color: var(--text-secondary);
    border-radius: 8px 0px 0px 8px;
    border: 2px solid #2b2f36;
  }

  /* Nav Tabs */
  .nav-tabs {
    display: flex;
    padding: 0 20px;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    padding: 10px 6px 12px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    color: var(--tab-inactive);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
    text-decoration: none;
  }

  .nav-tab.active {
    color: var(--tab-active);
    border-bottom-color: var(--accent-gold);
  }

  .nav-tab .dot {
    position: absolute;
    top: 8px;
    right: -2px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-gold);
  }

  /* Main content */
  .main-content {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
    padding-bottom: 80px;
  }

  .main-content::-webkit-scrollbar { display: none; }

  /* Balance Section */
  .balance-section {
    padding: 20px 20px 16px;
  }

  .balance-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .balance-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .eye-icon {
    width: 18px;
    height: 18px;
    opacity: 0.6;
  }

  .header-icons {
    display: flex;
    gap: 14px;
  }

  .header-icon-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-card);
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
  }

  .header-icon-btn svg {
    width: 16px;
    height: 16px;
    fill: var(--text-secondary);
  }

  .balance-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 34px;
    font-weight: 700;
    color: var(--text-primary);
    display: flex;
    align-items: baseline;
    gap: 8px;
    line-height: 1.1;
    letter-spacing: -2.5px;
  }

  .balance-currency {
    font-size: 17px;
    font-weight: 600;
    color: #eaecef;
    display: flex;
    align-items: center;
    gap: 4px;
    letter-spacing: .5px;
  }

  .balance-currency svg {
    width: 12px;
    height: 12px;
  }

  .balance-usd {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Action Buttons */
  .action-buttons {
    display: flex;
    justify-content: space-around;
    padding: 16px 16px 20px;
    gap: 8px;
  }

  .action-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .action-btn-icon {
    width: 52px;
    height: 52px;
    background: var(--bg-card);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  .action-btn:hover .action-btn-icon {
    background: var(--bg-card2);
    border-color: var(--accent-gold);
  }

  .action-btn-icon svg {
    width: 22px;
    height: 22px;
    stroke: var(--accent-gold);
    fill: none;
  }

  .action-btn-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  /* Notification Cards */
  .notifications {
    margin: 0 16px 16px;
    background: var(--bg-card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .notification-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    gap: 10px;
  }

  .notification-item:not(:last-child) {
    border-bottom: 1px solid var(--border);
  }

  .notification-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .notif-bell {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .notif-text {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .notif-status {
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .notif-status.complete {
    color: #0ecb81;
  }

  .notif-status.cancelled {
    color: var(--text-secondary);
  }

  .notif-arrow {
    font-size: 11px;
  }

  /* Crypto / Account Tabs */
  .asset-tabs {
    display: flex;
    align-items: center;
    padding: 4px 20px 0;
    margin-bottom: 14px;
    justify-content: space-between;
  }

  .asset-tab-group {
    display: flex;
    gap: 20px;
  }

  .asset-tab {
    font-size: 14px;
    font-weight: 600;
    color: var(--tab-inactive);
    cursor: pointer;
    padding-bottom: 8px;
    border-bottom: 2px solid transparent;
  }

  .asset-tab.active {
    color: var(--text-primary);
    border-bottom-color: var(--accent-gold);
  }

  .filter-icon {
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 18px;
  }

  /* Crypto Asset Row */
  .asset-row {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 14px;
  }

  .asset-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #26a17b, #1a7a5e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: white;
    flex-shrink: 0;
    border: 2px solid rgba(38,161,123,0.3);
  }

  .asset-icon.usdt {
    background: linear-gradient(135deg, #26a17b, #1a7a5e);
  }

  .asset-info {
    flex: 1;
  }

  .asset-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .asset-fullname {
    font-size: 11.5px;
    color: var(--text-secondary);
  }

  .asset-balance {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* BTC/FDUSD Card */
  .btc-card {
    margin: 10px 16px 16px;
    background: var(--bg-card);
    border-radius: 16px;
    padding: 18px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .btc-card::before {
    content: '';
    position: absolute;
    top: -30px;
    right: -30px;
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, rgba(240,185,11,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .btc-pair {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .btc-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .btc-change {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent-red);
    margin-bottom: 14px;
  }

  .discover-btn {
    background: var(--accent-gold);
    color: #000;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .discover-btn:hover {
    background: var(--accent-gold-dim);
  }

  .btc-diamond {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .diamond-outer {
    width: 56px;
    height: 56px;
    background: var(--bg-card2);
    border-radius: 12px;
    transform: rotate(0deg);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 1px solid var(--border);
  }

  .diamond-inner {
    width: 32px;
    height: 32px;
    background: var(--accent-gold);
    border-radius: 6px;
    transform: rotate(45deg);
    position: absolute;
    bottom: -8px;
    right: -8px;
  }

  .diamond-dot {
    width: 10px;
    height: 10px;
    background: #000;
    border-radius: 50%;
    position: absolute;
    z-index: 1;
    bottom: -3px;
    right: -3px;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 20px;
    z-index: 100;
  }

  .bottom-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    flex: 1;
  }

  .bottom-nav-item svg {
    width: 22px;
    height: 22px;
    stroke: var(--text-secondary);
    fill: none;
    transition: stroke 0.2s;
  }

  .bottom-nav-item.active svg {
    stroke: var(--text-primary);
    fill: var(--text-primary);
  }

  .bottom-nav-label {
    font-size: 10.5px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .bottom-nav-item.active .bottom-nav-label {
    color: var(--text-primary);
    font-weight: 600;
  }

  /* Divider */
  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px 16px;
  }

/* Exchange / Web3 Tab */
  .exchange-tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 8px 60px;
    background: var(--bg-primary);
  }

  .exchange-tab {
    border: 2px solid var(--bg-input);
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--tab-inactive);
    border-radius: 8px 0px 0px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .exchange-tab.active {
    background: var(--bg-input);
    color: var(--tab-active);
    border-radius: 0px 8px 8px 0px;
  }

  
</style>
</head>
