<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Withdrawal Details</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #181a20;
      --surface: #1e2026;
      --divider: #2b2f36;
      --text-main: #eaecef;
      --text-muted: #848e9c;
      --text-label: #707a8a;
      --accent-yellow: #f0b90b;
      --accent-green: #03a66d;
      --accent-link: #f0b90b;
      --badge-trx-bg: #f0b90b22;
      --badge-trx-text: #f0b90b;
      --btn-bg: #2b2f36;
      --btn-text: #eaecef;
      --font-sans: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html,
    body {
      background: #111418;
      color: var(--text-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      border-radius: 11px;
    }

    /* Phone shell */
    .phone {
      width: 390px;
      min-height: 100vh;
      background: #1a1d21;
      display: flex;
      flex-direction: column;
      padding-bottom: 32px;
      position: relative;
      border-radius: 31px;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 45px 4px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
    }

    .battery {
      background: var(--accent-yellow);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .signal {
      display: flex;
      gap: 2px;
      align-items: flex-end;
    }

    .signal span {
      background: var(--text-main);
      width: 3px;
      border-radius: 1px;
      display: block;
    }

    .signal span:nth-child(1) {
      height: 4px;
      opacity: 0.3;
    }

    .signal span:nth-child(2) {
      height: 7px;
      opacity: 0.5;
    }

    .signal span:nth-child(3) {
      height: 10px;
    }

    .signal span:nth-child(4) {
      height: 13px;
    }

    /* Top nav */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px 16px;
    }

    .nav-back {
      font-size: 22px;
      color: var(--text-main);
      cursor: pointer;
      line-height: 1;
      user-select: none;
    }

    .nav-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-main);
      letter-spacing: 0.2px;
    }

    .nav-help {
      width: 28px;
      height: 28px;
      border: 1.5px solid var(--text-muted);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 700;
    }

    /* Hero amount */
    .hero {
      text-align: center;
      padding: 0px 10px 0px;
    }

    .hero-amount {
      font-size: 34px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.5px;
      font-family: var(--font-sans);
    }

    .hero-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      color: var(--accent-green);
      font-size: 14px;
      font-weight: 600;
    }

    .hero-status .check-circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent-green);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-status .check-circle svg {
      width: 10px;
      height: 10px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hero-note {
      margin-top: 10px;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.5;
      padding: 0 0px;
    }

    .hero-link {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: var(--accent-link);
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }

    .hero-link:hover {
      text-decoration: underline;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--divider);
      margin: 20px 0 0;
    }

    /* Details rows */
    .details {
      padding: 6px 20px 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 11px 0;
      
      gap: 50px;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row-label {
      font-size: 13px;
      color: var(--text-label);
      min-width: 100px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .row-value {
      font-size: 13px;
      color: var(--text-main);
      text-align: right;
      word-break: break-all;
      flex: 1;
    }

    .row-value.mono {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
    }

    .row-value a {
      color: var(--text-main);
      
      text-decoration-color: var(--text-muted);
      text-underline-offset: 2px;
      cursor: pointer;
    }

    /* Network badge */
    .badge-trx {
      background: var(--badge-trx-bg);
      color: var(--badge-trx-text);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    /* Copy icon inline */
    .copy-icon {
      display: inline-flex;
      vertical-align: middle;
      margin-left: 4px;
      cursor: pointer;
      opacity: 0.6;
    }

    .copy-icon:hover {
      opacity: 1;
    }

    .copy-icon svg {
      width: 13px;
      height: 13px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      padding: 28px 20px 0;
    }

    .btn {
      flex: 1;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 10px;
      padding: 14px 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.1px;
    }

    .btn:hover {
      background: #353a43;
    }

    .btn:active {
      opacity: 0.7;
    }

    /* Home indicator */
    .home-bar {
      margin-top: auto;
      padding-top: 32px;
      display: flex;
      justify-content: center;
    }

    .home-bar span {
      width: 120px;
      height: 4px;
      background: var(--text-muted);
      border-radius: 2px;
      opacity: 0.4;
    }

    /* Tooltip on copy */
    .tooltip {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #3a3f48;
      color: var(--text-main);
      font-size: 12px;
      padding: 7px 14px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
      white-space: nowrap;
    }

    .tooltip.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="phone">

    <!-- Status Bar -->
    <div class="status-bar">
      <span id="tim"></span>
      <div class="status-right">
        <div class="signal">
          <span></span><span></span><span></span><span></span>

    </div>

    <!-- Nav -->
    <div class="nav">
      <div class="nav-back">&#8592;</div>
      <div class="nav-title">Withdrawal Details</div>

    </div>

    <!-- Hero -->
    <div class="hero">

      <div class="hero-status">
        <div class="check-circle">
          <svg viewBox="0 0 12 12">

    <div class="divider"></div>

    <!-- Details -->
    <div class="details">

        <span class="row-label">Network</span>
        <span class="row-value"><span class="badge-trx" id="network2"></span></span>
      </div>

      <div class="row">
        <span class="row-label">Address</span>
        <span class="row-value mono" id="address2">
          
          <span class="copy-icon" onclick="copyText('')" title="Copy">
            <svg viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
            </svg>
          </span>
        </span>
      </div>

      <div class="row">
        <span class="row-label">Txid</span>
        <span class="row-value mono">
          <a
            onclick="copyText('')" id="txid2"></a>
          <span class="copy-icon"
            onclick="copyText('')"
            title="Copy">
            <svg viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
            </svg>
          </span>
        </span>
      </div>

      <div class="row">
        <span class="row-label">Withdrawal Amount</span>
        <span class="row-value"><span id="wamount2"></span> USDT</span>
      </div>

      <div class="row">
        <span class="row-label">Network fee</span>
        <span class="row-value"><span id="nfee2"></span> USDT</span>
      </div>

      <div class="row">
        <span class="row-label" >Withdrawal Wallet</span>
        <span class="row-value" id="wwallet2"></span>
      </div>

      <div class="row">
        <span class="row-label">Date</span>
        <span class="row-value" id="wdate2"></span>
      </div>

    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn">Scam Report</button>
      <button class="btn">Save Address</button>
    </div>

    <!-- Home bar -->
    <div class="home-bar"><span></span></div>

  </div>

  <!-- Copy tooltip -->

  <script>
    function copyText(text) {
      navigator.clipboard.writeText(text).catch(() => { });
      const t = document.getElementById('tooltip');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1600);
    }
  </script>
